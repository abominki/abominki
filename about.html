<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#fcfbfb" />
    <meta name="description" content="About Abigail Kim." />
    <title>About — Abigail Kim</title>
    <link rel="icon" type="image/svg+xml" href="./assets/favicon.svg?v=2" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body>
    <div class="wrap">
      <a class="back" href="./index.html">← Back to projects</a>
      <header>
        <h1 class="name">About</h1>
        <p class="bio" id="bio"></p>
      </header>

      <div class="rule"></div>

      <div class="about" id="about"></div>
    </div>

    <script src="./assets/profile.js"></script>
    <script>
      const $ = (id) => document.getElementById(id);
      $("bio").textContent = PROFILE.bio;
      const about = $("about");
      (PROFILE.about || []).forEach((para) => {
        const p = document.createElement("p");
        p.textContent = para;
        about.append(p);
      });
    </script>
  </body>
</html>
