<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#fcfbfb" />
    <meta name="description" content="Abigail Kim — Mechanical Engineering portfolio." />
    <title>Abigail Kim — Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: light;
        --blush: #d49bac;
        --blush-strong: #c07f93;
        --blush-soft: #f6e0e8;
        --silver: #b9bdc4;
        --silver-soft: #e7e9ec;
        --ink: #26242a;
        --muted: #8a8d94;
        --paper: #fcfbfb;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        background: var(--paper);
        color: var(--ink);
        font-family: "Be Vietnam Pro", ui-sans-serif, -apple-system, BlinkMacSystemFont,
          "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif;
        font-feature-settings: "kern";
        -webkit-font-smoothing: antialiased;
        line-height: 1.5;
      }

      .wrap { max-width: 860px; margin: 0 auto; padding: 64px 24px 96px; }

      /* Header */
      header { margin-bottom: 40px; }
      .name {
        margin: 0;
        font-size: clamp(28px, 5vw, 38px);
        font-weight: 700;
        letter-spacing: -0.02em;
        color: var(--blush);
      }
      .bio { margin: 6px 0 0; color: var(--muted); font-size: 15px; }
      .links {
        margin-top: 18px; display: flex; flex-wrap: wrap; gap: 18px;
        font-size: 14px;
      }
      .links a {
        color: var(--blush-strong); text-decoration: none;
        border-bottom: 1px solid var(--blush-soft); padding-bottom: 1px;
        transition: border-color 150ms ease;
      }
      .links a:hover { border-bottom-color: var(--blush); }
      .rule { height: 1px; background: var(--silver-soft); margin: 32px 0 28px; }

      /* Grid */
      .grid {
        display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
      }
      @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }

      .card {
        display: block; text-align: left; width: 100%; padding: 0;
        font: inherit; color: inherit; cursor: pointer;
        background: #fff; border: 1px solid var(--silver-soft);
        border-radius: 12px; overflow: hidden;
        transition: transform 150ms ease, box-shadow 150ms ease, border-color 150ms ease;
      }
      .card:hover {
        transform: translateY(-3px);
        border-color: #eccdd6;
        box-shadow: 0 6px 22px rgba(212, 155, 172, 0.18);
      }
      .card:focus-visible { outline: 2px solid var(--blush); outline-offset: 2px; }

      .ph, .card .shot, .card .cover-img {
        display: flex; align-items: center; justify-content: center;
        width: 100%; height: 132px;
        background: linear-gradient(135deg, #eceef0, #d8dbdf);
        color: #a7abb2; font-size: 12px; object-fit: cover;
      }
      .card-body { padding: 14px 15px 16px; }
      .card-title { margin: 0; font-size: 15px; font-weight: 650; }
      .card-desc { margin: 5px 0 0; font-size: 13px; color: var(--muted); }

      /* Modal */
      .overlay {
        position: fixed; inset: 0; z-index: 50;
        display: none; align-items: center; justify-content: center;
        padding: 24px; background: rgba(38, 36, 42, 0.42);
        backdrop-filter: blur(3px);
      }
      .overlay.open { display: flex; }
      .modal {
        position: relative; width: min(560px, 100%);
        max-height: 88vh; overflow: auto;
        background: #fff; border: 1px solid var(--silver-soft);
        border-radius: 14px; box-shadow: 0 18px 50px rgba(38, 36, 42, 0.22);
      }
      .gallery { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; }
      .gallery .ph, .gallery .shot { height: 168px; border-radius: 0; }
      .modal-body { padding: 20px 22px 24px; }
      .modal-title { margin: 0; font-size: 19px; font-weight: 700; color: var(--blush); }
      .modal-desc { margin: 10px 0 18px; font-size: 14px; color: #55535a; }
      .skills-label {
        font-size: 11px; text-transform: uppercase; letter-spacing: 0.07em;
        color: var(--silver); margin-bottom: 6px;
      }
      .skills-text {
        font-size: 14px; color: #55535a;
        border-left: 2px solid var(--blush-soft); padding-left: 12px;
      }
      .close {
        position: absolute; top: 12px; right: 12px; z-index: 1;
        width: 32px; height: 32px; display: grid; place-items: center;
        border: none; border-radius: 999px; cursor: pointer;
        background: rgba(255, 255, 255, 0.85); color: var(--ink); font-size: 15px;
        backdrop-filter: blur(6px);
      }
      .close:hover { background: #fff; }
      .close:focus-visible { outline: 2px solid var(--blush); outline-offset: 2px; }

      @media (prefers-reduced-motion: reduce) {
        .card { transition: none; }
        .card:hover { transform: none; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <h1 class="name" id="name"></h1>
        <p class="bio" id="bio"></p>
        <nav class="links" id="links"></nav>
      </header>

      <div class="rule"></div>

      <main class="grid" id="grid" aria-label="Projects"></main>
    </div>

    <div class="overlay" id="overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="modal">
        <button class="close" id="close" type="button" aria-label="Close">✕</button>
        <div class="gallery" id="gallery"></div>
        <div class="modal-body">
          <h2 class="modal-title" id="modal-title"></h2>
          <p class="modal-desc" id="modal-desc"></p>
          <div class="skills-label">Skills I learned</div>
          <p class="skills-text" id="modal-skills"></p>
        </div>
      </div>
    </div>

    <script src="./assets/profile.js"></script>
    <script src="./assets/projects.js"></script>
    <script>
      const $ = (id) => document.getElementById(id);

      // --- placeholder / image helper ---
      function shot(src, alt) {
        if (!src) {
          const d = document.createElement("div");
          d.className = "ph";
          d.textContent = "image";
          return d;
        }
        const img = document.createElement("img");
        img.className = "shot";
        img.src = src;
        img.alt = alt || "";
        img.onerror = () => {
          const d = document.createElement("div");
          d.className = "ph";
          d.textContent = "image";
          img.replaceWith(d);
        };
        return img;
      }

      // --- header ---
      function renderHeader() {
        $("name").textContent = PROFILE.name;
        $("bio").textContent = PROFILE.bio;
        const nav = $("links");
        const items = [...(PROFILE.links || [])];
        if (PROFILE.resumeUrl) items.push({ label: "Résumé", href: PROFILE.resumeUrl });
        for (const { label, href } of items) {
          const a = document.createElement("a");
          a.textContent = label;
          a.href = href;
          if (!href.startsWith("mailto:")) { a.target = "_blank"; a.rel = "noopener"; }
          nav.append(a);
        }
      }

      // --- grid ---
      function renderGrid() {
        const grid = $("grid");
        PROJECTS.forEach((p, i) => {
          const card = document.createElement("button");
          card.className = "card";
          card.type = "button";
          const cover = shot(p.cover, p.title);
          cover.classList.add("cover-img");
          const body = document.createElement("div");
          body.className = "card-body";
          body.innerHTML =
            `<h2 class="card-title"></h2><p class="card-desc"></p>`;
          body.querySelector(".card-title").textContent = p.title;
          body.querySelector(".card-desc").textContent = p.description;
          card.append(cover, body);
          card.addEventListener("click", () => openModal(i));
          grid.append(card);
        });
      }

      // --- modal ---
      const overlay = $("overlay");
      let lastFocused = null;

      function openModal(i) {
        const p = PROJECTS[i];
        const gallery = $("gallery");
        gallery.replaceChildren();
        const imgs = p.images && p.images.length ? p.images : [null, null];
        imgs.forEach((src) => gallery.append(shot(src, p.title)));
        $("modal-title").textContent = p.title;
        $("modal-desc").textContent = p.description;
        $("modal-skills").textContent = p.skills;
        lastFocused = document.activeElement;
        overlay.classList.add("open");
        $("close").focus();
      }

      function closeModal() {
        overlay.classList.remove("open");
        if (lastFocused) lastFocused.focus();
      }

      $("close").addEventListener("click", closeModal);
      overlay.addEventListener("click", (e) => { if (e.target === overlay) closeModal(); });
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape" && overlay.classList.contains("open")) closeModal();
      });

      renderHeader();
      renderGrid();
    </script>
  </body>
</html>
