<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#fcfbfb" />
    <meta name="description" content="Abigail Kim — Mechanical Engineering portfolio." />
    <title>Abigail Kim — Portfolio</title>
    <link rel="icon" href="/favicon.ico" sizes="32x32" />
    <link rel="icon" type="image/svg+xml" href="./assets/favicon.svg" />
    <link rel="apple-touch-icon" href="./assets/favicon-180.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body>
    <main id="app"></main>

    <script src="./assets/profile.js"></script>
    <script src="./assets/projects.js"></script>
    <script>
      const app = document.getElementById("app");

      function el(tag, cls, text) {
        const e = document.createElement(tag);
        if (cls) e.className = cls;
        if (text != null) e.textContent = text;
        return e;
      }

      // image, with graceful placeholder fallback
      function shot(src, alt) {
        if (!src) {
          const d = el("div", "ph", "image");
          return d;
        }
        const img = el("img", "shot");
        img.src = src;
        img.alt = alt || "";
        img.onerror = () => img.replaceWith(el("div", "ph", "image"));
        return img;
      }

      function linkNodes(items) {
        const nav = el("nav", "links");
        for (const { label, href } of items) {
          const a = el("a", null, label);
          a.href = href;
          if (href.startsWith("http")) { a.target = "_blank"; a.rel = "noopener"; }
          nav.append(a);
        }
        return nav;
      }

      function contactItems() {
        const items = [...(PROFILE.links || [])];
        if (PROFILE.resumeUrl) items.push({ label: "Résumé", href: PROFILE.resumeUrl });
        return items;
      }

      function renderHero() {
        const sec = el("section", "hero reveal");
        const name = el("h1", "hero-name", PROFILE.name);
        const tag = el("p", "hero-tagline");
        const lines = Array.isArray(PROFILE.bio) ? PROFILE.bio : [PROFILE.bio];
        lines.forEach((line, i) => {
          if (i) tag.append(document.createElement("br"));
          tag.append(document.createTextNode(line));
        });
        sec.append(name, tag, linkNodes([{ label: "About", href: "#about" }, ...contactItems()]));
        sec.append(el("div", "scroll-cue", "↓"));
        return sec;
      }

      function renderAbout() {
        const sec = el("section", "about-section reveal");
        sec.id = "about";
        sec.append(el("p", "section-label", "About"));
        const copy = el("div", "about-copy");
        (PROFILE.about || []).forEach((p) => copy.append(el("p", null, p)));
        sec.append(copy);
        return sec;
      }

      function renderProject(p, i) {
        const sec = el("section", "project" + (i % 2 ? " flip" : ""));

        const main = el("div", "project-main reveal");
        const media = el("div", "project-media");
        const cover = shot(p.cover, p.title);
        cover.classList.add("cover-img");
        media.append(cover);

        const text = el("div", "project-text");
        if (p.tag) text.append(el("span", "eyebrow", p.tag));
        text.append(el("h2", "p-title", p.title));
        if (p.blurb) text.append(el("p", "p-blurb", p.blurb));
        if (p.description) text.append(el("p", "p-desc", p.description));
        if (p.skills) {
          const sk = el("div", "p-skills");
          sk.append(el("div", "skills-label", "Skills I learned"));
          sk.append(el("p", "skills-text", p.skills));
          text.append(sk);
        }
        main.append(media, text);
        sec.append(main);

        if (p.images && p.images.length) {
          const rows = Array.isArray(p.images[0]) ? p.images : [p.images];
          const gal = el("div", "project-gallery reveal");
          rows.forEach((row) => {
            const r = el("div", "grow");
            row.forEach((src) => r.append(shot(src, p.title)));
            gal.append(r);
          });
          sec.append(gal);
        }
        return sec;
      }

      // build the page
      app.append(renderHero());
      app.append(renderAbout());
      PROJECTS.forEach((p, i) => {
        if (i > 0) app.append(el("div", "project-divider"));
        app.append(renderProject(p, i));
      });
      const foot = el("footer", "foot");
      foot.append(linkNodes(contactItems()));
      foot.append(el("div", null, "© " + PROFILE.name));
      app.append(foot);

      // scroll-reveal
      const reduce = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      const reveals = document.querySelectorAll(".reveal");
      if (reduce || !("IntersectionObserver" in window)) {
        reveals.forEach((e) => e.classList.add("in"));
      } else {
        const io = new IntersectionObserver(
          (entries) => {
            entries.forEach((e) => {
              if (e.isIntersecting) { e.target.classList.add("in"); io.unobserve(e.target); }
            });
          },
          { threshold: 0.12, rootMargin: "0px 0px -8% 0px" }
        );
        reveals.forEach((e) => io.observe(e));
      }
    </script>
  </body>
</html>
